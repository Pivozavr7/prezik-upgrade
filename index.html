<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PREZIK UPGRADE</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0d0f14; --surface:#161a24; --surface2:#1e2330;
  --border:#2a2f3e; --accent:#c8ff00; --win:#4cff72;
  --lose:#ff4444; --text:#e8eaf0; --muted:#5a6070;
}
body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; overflow-x:hidden; user-select:none; }
.header { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--border); }
.logo { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px; color:var(--accent); }
.header-user { font-size:11px; color:var(--muted); letter-spacing:1px; }
.page { padding:16px 18px 28px; display:flex; flex-direction:column; gap:16px; align-items:center; }
.cards-row { display:grid; grid-template-columns:1fr 32px 1fr; gap:8px; align-items:center; width:100%; max-width:360px; }
.card-slot { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 10px; min-height:96px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; cursor:pointer; transition:border-color 0.2s; }
.card-slot.is-from.has-card { border-color:rgba(200,255,0,0.4); }
.card-slot.is-to.has-card { border-color:rgba(76,255,114,0.4); }
.card-slot:active { transform:scale(0.97); }
.slot-emoji { font-size:24px; line-height:1; }
.slot-name { font-size:10px; font-weight:500; text-align:center; line-height:1.3; }
.slot-rarity { font-size:9px; color:var(--muted); letter-spacing:0.5px; }
.slot-empty { font-size:10px; color:var(--muted); letter-spacing:1px; text-align:center; line-height:1.7; }
.arrow-mid { text-align:center; color:var(--muted); font-size:18px; }
.wheel-wrap { position:relative; width:320px; height:380px; flex-shrink:0; }
#wheelCanvas { display:block; }
.btn-upgrade { width:100%; max-width:300px; padding:15px; background:var(--accent); color:#000; font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:4px; border:none; border-radius:10px; cursor:pointer; transition:opacity 0.2s, transform 0.1s; }
.btn-upgrade:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; }
.btn-upgrade:not(:disabled):active { transform:scale(0.97); }
.result-flash { display:none; position:fixed; inset:0; z-index:200; align-items:center; justify-content:center; flex-direction:column; gap:10px; pointer-events:none; }
.result-flash.show { display:flex; }
.rf-bg { position:absolute; inset:0; opacity:0.18; }
.rf-bg.win { background:var(--win); }
.rf-bg.lose { background:var(--lose); }
.rf-text { font-family:'Bebas Neue',sans-serif; font-size:72px; letter-spacing:8px; position:relative; z-index:1; animation:fi 0.3s ease; }
.rf-text.win { color:var(--win); text-shadow:0 0 40px rgba(76,255,114,0.9); }
.rf-text.lose { color:var(--lose); text-shadow:0 0 40px rgba(255,68,68,0.9); }
.rf-sub { font-size:13px; color:rgba(255,255,255,0.65); letter-spacing:1px; position:relative; z-index:1; }
@keyframes fi { from{transform:scale(0.6);opacity:0;} to{transform:scale(1);opacity:1;} }
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.82); z-index:100; flex-direction:column; }
.modal-bg.open { display:flex; }
.modal { background:var(--surface); border-top:1px solid var(--border); border-radius:16px 16px 0 0; padding:16px; margin-top:auto; max-height:72vh; display:flex; flex-direction:column; }
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.modal-title { font-size:11px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
.modal-close { background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; padding:4px 8px; }
.modal-list { overflow-y:auto; display:flex; flex-direction:column; gap:6px; }
.modal-list::-webkit-scrollbar { width:3px; }
.modal-list::-webkit-scrollbar-thumb { background:var(--border); }
.mc { display:flex; align-items:center; gap:12px; padding:10px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; cursor:pointer; }
.mc:active { border-color:var(--accent); opacity:0.8; }
.mc-emoji { font-size:22px; flex-shrink:0; }
.mc-info { flex:1; min-width:0; }
.mc-name { font-size:12px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mc-rarity { font-size:10px; color:var(--muted); margin-top:2px; }
.mc-count { font-size:11px; color:var(--muted); flex-shrink:0; }
.no-cards { text-align:center; color:var(--muted); font-size:12px; padding:30px 0; letter-spacing:1px; }
.rc-common{color:#9a9a9a} .rc-rare{color:#4da6ff} .rc-veryrare{color:#b04dff}
.rc-strange{color:#ff9e00} .rc-legendary{color:#ffd700} .rc-jew{color:#00e5ff} .rc-huesosos{color:#ff4444}
</style>
</head>
<body>
<div class="header">
  <div class="logo">PREZIK UP</div>
  <div class="header-user" id="uid">@USER</div>
</div>

<div class="page">
  <div class="cards-row">
    <div class="card-slot is-from" id="slot-from" onclick="openModal('from')"><div class="slot-empty">ТВОЯ<br>КАРТОЧКА</div></div>
    <div class="arrow-mid">→</div>
    <div class="card-slot is-to" id="slot-to" onclick="openModal('to')"><div class="slot-empty">ЦЕЛЬ<br>АПГРЕЙДА</div></div>
  </div>
  <div class="wheel-wrap">
    <canvas id="wheelCanvas" width="320" height="380"></canvas>
  </div>
  <button class="btn-upgrade" id="btn-upgrade" disabled onclick="doUpgrade()">ПРОКАЧАТЬ</button>
</div>

<div class="result-flash" id="result-flash">
  <div class="rf-bg" id="rf-bg"></div>
  <div class="rf-text" id="rf-text"></div>
  <div class="rf-sub" id="rf-sub"></div>
</div>

<div class="modal-bg" id="modal-bg" onclick="closeBg(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">выбери карточку</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-list" id="modal-list"></div>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp || {};
if (tg) {
  tg.expand();
  tg.setHeaderColor?.('#0d0f14');
  tg.setBackgroundColor?.('#0d0f14');
}

const userId = tg.initDataUnsafe?.user?.id || null;
document.getElementById('uid').textContent = '@' + (tg.initDataUnsafe?.user?.username || 'user');

const RARITY_WEIGHT = {'Обычный':100,'Редкий':40,'Очень редкий':15,'Странный':7,'Легендарный':3,'Еврей':1.5,'Хуесос':0.5};
const RARITY_ORDER = ['Обычный','Редкий','Очень редкий','Странный','Легендарный','Еврей','Хуесос'];
const RARITY_CLASS = {'Обычный':'rc-common','Редкий':'rc-rare','Очень редкий':'rc-veryrare','Странный':'rc-strange','Легендарный':'rc-legendary','Еврей':'rc-jew','Хуесос':'rc-huesosos'};
const RARITY_EMOJI = {'Обычный':'⬜','Редкий':'🟦','Очень редкий':'🟣','Странный':'☮️','Легендарный':'🌟','Еврей':'✡️','Хуесос':'❗'};

let allCards = {};
let inventory = [];
let selectedFrom = null;
let selectedTo = null;
let spinning = false;

const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const CX = 160, CY = 165, R = 110, RW = 22;
let arrowAngle = Math.PI / 2;

// ==================== ОСНОВНЫЕ ФУНКЦИИ (оставляем как были) ====================
function drawAll(chance, arrow) { /* ... твой код drawAll без изменений ... */ }
function drawChanceText(chance) { /* ... без изменений ... */ }
function getChance() { /* ... без изменений ... */ }
function updateUI() { /* ... без изменений ... */ }
function spinArrow(win, chance, cb) { /* ... без изменений ... */ }
function getEmoji(card) { /* ... без изменений ... */ }
function renderSlot(el, key, type) { /* ... без изменений ... */ }
function openModal(type) { /* ... без изменений ... */ }
function buildMC(card, key, count) { /* ... без изменений ... */ }
function pickFrom(k) { /* ... без изменений ... */ }
function pickTo(k) { /* ... без изменений ... */ }
function closeModal() { /* ... без изменений ... */ }
function closeBg(e) { /* ... без изменений ... */ }

async function loadCards() {
  try {
    const r = await fetch('cards.json');
    allCards = await r.json();
  } catch(e) {
    console.warn('cards.json не найден');
  }
}

// ==================== НОВАЯ doUpgrade С sendData ====================
function doUpgrade() {
  if (spinning || !selectedFrom || !selectedTo) return;
  const chance = getChance();
  if (!chance) return;

  spinning = true;
  document.getElementById('btn-upgrade').disabled = true;

  const win = Math.random() * 100 < chance;

  spinArrow(win, chance, () => {
    const fl = document.getElementById('result-flash');
    document.getElementById('rf-bg').className = 'rf-bg ' + (win ? 'win' : 'lose');
    const rt = document.getElementById('rf-text');
    rt.className = 'rf-text ' + (win ? 'win' : 'lose');
    rt.textContent = win ? 'АПГРЕЙД!' : 'ПРОВАЛ';
    document.getElementById('rf-sub').textContent = win
      ? 'Получена: ' + (allCards[selectedTo]?.name || '')
      : 'Карточка потеряна навсегда';

    if (win) {
      const i = inventory.indexOf(selectedFrom);
      if (i !== -1) inventory.splice(i, 1);
      inventory.push(selectedTo);
    } else {
      const i = inventory.indexOf(selectedFrom);
      if (i !== -1) inventory.splice(i, 1);
    }

    // === ОТПРАВКА РЕЗУЛЬТАТА В БОТ ===
    if (window.Telegram?.WebApp) {
      const payload = {
        action: "upgrade_result",
        inventory: inventory,
        user_id: userId
      };
      window.Telegram.WebApp.sendData(JSON.stringify(payload));
    }

    fl.classList.add('show');

    setTimeout(() => {
      fl.classList.remove('show');
      spinning = false;
      // Аппа закроется автоматически после sendData
    }, 2800);
  });
}

// ==================== ЗАПУСК ====================
(async () => {
  await loadCards();

  const params = new URLSearchParams(window.location.search);
  const invParam = params.get('inv');
  if (invParam) {
    try {
      inventory = JSON.parse(decodeURIComponent(invParam));
    } catch(e) {
      console.error('Bad inv param');
    }
  }

  drawAll(null, arrowAngle);
})();
</script>
</body>
</html>
