<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PREZIK UPGRADE</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0d0f14; --surface:#161a24; --surface2:#1e2330;
  --border:#2a2f3e; --accent:#c8ff00; --win:#4cff72;
  --lose:#ff4444; --text:#e8eaf0; --muted:#5a6070;
}
body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; overflow-x:hidden; user-select:none; }
.header { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--border); }
.logo { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px; color:var(--accent); }
.header-user { font-size:11px; color:var(--muted); letter-spacing:1px; }
.page { padding:16px 18px 28px; display:flex; flex-direction:column; gap:16px; align-items:center; }
.cards-row { display:grid; grid-template-columns:1fr 32px 1fr; gap:8px; align-items:center; width:100%; max-width:360px; }
.card-slot { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 10px; min-height:96px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; cursor:pointer; transition:border-color 0.2s; }
.card-slot.is-from.has-card { border-color:rgba(200,255,0,0.4); }
.card-slot.is-to.has-card { border-color:rgba(76,255,114,0.4); }
.card-slot:active { transform:scale(0.97); }
.slot-emoji { font-size:24px; line-height:1; }
.slot-name { font-size:10px; font-weight:500; text-align:center; line-height:1.3; }
.slot-rarity { font-size:9px; color:var(--muted); letter-spacing:0.5px; }
.slot-empty { font-size:10px; color:var(--muted); letter-spacing:1px; text-align:center; line-height:1.7; }
.arrow-mid { text-align:center; color:var(--muted); font-size:18px; }
.wheel-wrap { position:relative; width:320px; height:380px; flex-shrink:0; }
#wheelCanvas { display:block; }
.btn-upgrade { width:100%; max-width:300px; padding:15px; background:var(--accent); color:#000; font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:4px; border:none; border-radius:10px; cursor:pointer; transition:opacity 0.2s, transform 0.1s; }
.btn-upgrade:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; }
.btn-upgrade:not(:disabled):active { transform:scale(0.97); }
.result-flash { display:none; position:fixed; inset:0; z-index:200; align-items:center; justify-content:center; flex-direction:column; gap:10px; pointer-events:none; }
.result-flash.show { display:flex; }
.rf-bg { position:absolute; inset:0; opacity:0.18; }
.rf-bg.win { background:var(--win); }
.rf-bg.lose { background:var(--lose); }
.rf-text { font-family:'Bebas Neue',sans-serif; font-size:72px; letter-spacing:8px; position:relative; z-index:1; animation:fi 0.3s ease; }
.rf-text.win { color:var(--win); text-shadow:0 0 40px rgba(76,255,114,0.9); }
.rf-text.lose { color:var(--lose); text-shadow:0 0 40px rgba(255,68,68,0.9); }
.rf-sub { font-size:13px; color:rgba(255,255,255,0.65); letter-spacing:1px; position:relative; z-index:1; }
@keyframes fi { from{transform:scale(0.6);opacity:0;} to{transform:scale(1);opacity:1;} }
.modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.82); z-index:100; flex-direction:column; }
.modal-bg.open { display:flex; }
.modal { background:var(--surface); border-top:1px solid var(--border); border-radius:16px 16px 0 0; padding:16px; margin-top:auto; max-height:72vh; display:flex; flex-direction:column; }
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.modal-title { font-size:11px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
.modal-close { background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; padding:4px 8px; }
.modal-list { overflow-y:auto; display:flex; flex-direction:column; gap:6px; }
.modal-list::-webkit-scrollbar { width:3px; }
.modal-list::-webkit-scrollbar-thumb { background:var(--border); }
.mc { display:flex; align-items:center; gap:12px; padding:10px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; cursor:pointer; }
.mc:active { border-color:var(--accent); opacity:0.8; }
.mc-emoji { font-size:22px; flex-shrink:0; }
.mc-info { flex:1; min-width:0; }
.mc-name { font-size:12px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.mc-rarity{ font-size:10px; color:var(--muted); margin-top:2px; }
.mc-count { font-size:11px; color:var(--muted); flex-shrink:0; }
.no-cards { text-align:center; color:var(--muted); font-size:12px; padding:30px 0; letter-spacing:1px; }
.rc-common{color:#9a9a9a} .rc-rare{color:#4da6ff} .rc-veryrare{color:#b04dff}
.rc-strange{color:#ff9e00} .rc-legendary{color:#ffd700} .rc-jew{color:#00e5ff} .rc-huesosos{color:#ff4444}
</style>
</head>
<body>
<div class="header">
  <div class="logo">PREZIK UP</div>
  <div class="header-user" id="uid">@USER</div>
</div>

<div class="page">
  <div class="cards-row">
    <div class="card-slot is-from" id="slot-from" onclick="openModal('from')"><div class="slot-empty">ТВОЯ<br>КАРТОЧКА</div></div>
    <div class="arrow-mid">→</div>
    <div class="card-slot is-to" id="slot-to" onclick="openModal('to')"><div class="slot-empty">ЦЕЛЬ<br>АПГРЕЙДА</div></div>
  </div>
  <div class="wheel-wrap">
    <canvas id="wheelCanvas" width="320" height="380"></canvas>
  </div>
  <button class="btn-upgrade" id="btn-upgrade" disabled onclick="doUpgrade()">ПРОКАЧАТЬ</button>
</div>

<div class="result-flash" id="result-flash">
  <div class="rf-bg" id="rf-bg"></div>
  <div class="rf-text" id="rf-text"></div>
  <div class="rf-sub" id="rf-sub"></div>
</div>

<div class="modal-bg" id="modal-bg" onclick="closeBg(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">выбери карточку</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-list" id="modal-list"></div>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp || {};
if (tg) {
  tg.expand();
  tg.setHeaderColor?.('#0d0f14');
  tg.setBackgroundColor?.('#0d0f14');
}

const userId = tg.initDataUnsafe?.user?.id || null;
document.getElementById('uid').textContent = '@' + (tg.initDataUnsafe?.user?.username || 'user');

const RARITY_WEIGHT = {'Обычный':100,'Редкий':40,'Очень редкий':15,'Странный':7,'Легендарный':3,'Еврей':1.5,'Хуесос':0.5};
const RARITY_ORDER = ['Обычный','Редкий','Очень редкий','Странный','Легендарный','Еврей','Хуесос'];
const RARITY_CLASS = {'Обычный':'rc-common','Редкий':'rc-rare','Очень редкий':'rc-veryrare','Странный':'rc-strange','Легендарный':'rc-legendary','Еврей':'rc-jew','Хуесос':'rc-huesosos'};
const RARITY_EMOJI = {'Обычный':'⬜','Редкий':'🟦','Очень редкий':'🟣','Странный':'☮️','Легендарный':'🌟','Еврей':'✡️','Хуесос':'❗'};

let allCards = {};
let inventory = [];
let selectedFrom = null;
let selectedTo = null;
let spinning = false;

const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const CX = 160, CY = 165, R = 110, RW = 22;
let arrowAngle = Math.PI / 2;

function drawAll(chance, arrow) {
  ctx.clearRect(0, 0, 320, 380);
  const steps = 180;
  const arrowN = ((arrow % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  const half = chance ? (chance / 100) * Math.PI : 0;
  const mid = Math.PI / 2;
  const winS = mid - half;
  const winE = mid + half;

  function angDist(a, b) {
    return Math.abs(((a - b + Math.PI*3) % (Math.PI*2)) - Math.PI);
  }

  for (let i = 0; i < steps; i++) {
    const a1 = (i / steps) * Math.PI * 2;
    const a2 = ((i + 1.05) / steps) * Math.PI * 2;
    const aMid = (i + 0.5) / steps * Math.PI * 2;
    const inWin = chance && aMid >= winS && aMid <= winE;
    const glowSpread = Math.max(0.5, half * 1.1);
    const dist = angDist(aMid, arrowN);
    const gf = Math.pow(Math.max(0, 1 - dist / glowSpread), 1.8);

    let r = 22, g = 10, b = 10;
    if (inWin) {
      r = 13 + (76 - 13) * gf;
      g = 61 + (255 - 61) * gf;
      b = 28 + (114 - 28) * gf;
    }
    ctx.beginPath();
    ctx.arc(CX, CY, R, a1, a2);
    ctx.strokeStyle = `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;
    ctx.lineWidth = RW;
    ctx.lineCap = 'butt';
    ctx.stroke();
  }

  ctx.beginPath();
  ctx.arc(CX, CY, R - RW/2 - 1, 0, Math.PI*2);
  ctx.fillStyle = '#0d0f14';
  ctx.fill();

  const rTip = R + RW/2 + 1;
  const rOuter = R + RW/2 + 14;
  const hw = 9;
  const perp = arrow + Math.PI/2;
  const tipX = CX + Math.cos(arrow)*rTip;
  const tipY = CY + Math.sin(arrow)*rTip;
  const b1x = CX + Math.cos(arrow)*rOuter + Math.cos(perp)*hw;
  const b1y = CY + Math.sin(arrow)*rOuter + Math.sin(perp)*hw;
  const b2x = CX + Math.cos(arrow)*rOuter - Math.cos(perp)*hw;
  const b2y = CY + Math.sin(arrow)*rOuter - Math.sin(perp)*hw;

  ctx.beginPath();
  ctx.moveTo(tipX, tipY);
  ctx.lineTo(b1x, b1y);
  ctx.lineTo(b2x, b2y);
  ctx.closePath();
  ctx.fillStyle = '#fff';
  ctx.fill();

  drawChanceText(chance);
}

function drawChanceText(chance) {
  const text = chance ? chance + '%' : '—';
  ctx.font = 'bold 58px "Bebas Neue", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = chance ? '#e8eaf0' : '#2a2f3a';
  ctx.fillText(text, CX, CY - 10);
  ctx.font = '10px Inter';
  ctx.fillStyle = '#2a2f3a';
  ctx.letterSpacing = '2px';
  ctx.fillText('ШАНС УСПЕХА', CX, CY + 18);
  ctx.textBaseline = 'alphabetic';
}

function getChance() {
  if (!selectedFrom || !selectedTo) return null;
  const f = allCards[selectedFrom], t = allCards[selectedTo];
  if (!f || !t) return null;
  const wf = RARITY_WEIGHT[f.rarity] || 1;
  const wt = RARITY_WEIGHT[t.rarity] || 1;
  if (wt >= wf) return null;
  return Math.min(95, Math.max(1, Math.round((wt / wf) * 100)));
}

function updateUI() {
  const chance = getChance();
  document.getElementById('btn-upgrade').disabled = !chance;
  drawAll(chance, arrowAngle);
}

function spinArrow(win, chance, cb) {
  const half = (chance/100) * Math.PI;
  const mid = Math.PI/2;
  const wS = mid - half;
  const wE = mid + half;
  let finalAngle = win 
    ? wS + 0.06 + Math.random()*(half*2 - 0.12) 
    : wE + 0.06 + Math.random()*(Math.PI*2 - half*2 - 0.12);

  finalAngle = ((finalAngle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  const sa = ((arrowAngle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  let delta = finalAngle - sa;
  if (delta < 0) delta += Math.PI*2;
  const total = (4 + Math.floor(Math.random()*3))*Math.PI*2 + delta;

  const dur = 3600, t0 = performance.now(), startA = arrowAngle;

  function frame(now) {
    const t = Math.min((now - t0)/dur, 1);
    const e = 1 - Math.pow(1-t, 3);
    arrowAngle = startA + total * e;
    drawAll(getChance(), arrowAngle);
    if (t < 1) requestAnimationFrame(frame);
    else {
      arrowAngle = startA + total;
      drawAll(getChance(), arrowAngle);
      cb();
    }
  }
  requestAnimationFrame(frame);
}

function getEmoji(card) {
  if (!card) return '❓';
  const m = (card.name || '').match(/^(\p{Emoji_Presentation}|\p{Extended_Pictographic})/u);
  return m ? m[0] : (RARITY_EMOJI[card.rarity] || '🃏');
}

function renderSlot(el, key, type) {
  if (!key) {
    el.className = 'card-slot is-' + type;
    el.innerHTML = '<div class="slot-empty">' + (type==='from' ? 'ТВОЯ<br>КАРТОЧКА' : 'ЦЕЛЬ<br>АПГРЕЙДА') + '</div>';
    return;
  }
  const c = allCards[key];
  if (!c) return;
  el.className = 'card-slot is-' + type + ' has-card';
  el.innerHTML = `<div class="slot-emoji">${getEmoji(c)}</div><div class="slot-name">${c.name}</div><div class="slot-rarity ${RARITY_CLASS[c.rarity]||''}">${c.rarity}</div>`;
}

function openModal(type) {
  if (spinning) return;
  document.getElementById('modal-title').textContent = type==='from'?'Твоя карточка':'Цель апгрейда';
  const list = document.getElementById('modal-list'); list.innerHTML = '';

  if (type==='from') {
    const counts = {};
    inventory.forEach(k => counts[k] = (counts[k]||0)+1);
    const keys = Object.keys(counts).sort((a,b) => RARITY_ORDER.indexOf(allCards[a]?.rarity) - RARITY_ORDER.indexOf(allCards[b]?.rarity));
    if (!keys.length) list.innerHTML = '<div class="no-cards">ИНВЕНТАРЬ ПУСТ</div>';
    else keys.forEach(k => {
      const el = buildMC(allCards[k], k, counts[k]);
      el.onclick = () => pickFrom(k);
      list.appendChild(el);
    });
  } else {
    const fw = selectedFrom ? (RARITY_WEIGHT[allCards[selectedFrom]?.rarity]||999) : 999;
    const tgts = Object.entries(allCards).filter(([,v]) => (RARITY_WEIGHT[v.rarity]||0) < fw)
      .sort((a,b) => RARITY_ORDER.indexOf(a[1].rarity) - RARITY_ORDER.indexOf(b[1].rarity));
    if (!tgts.length) list.innerHTML = '<div class="no-cards">НЕТ КАРТОЧЕК РЕДЧЕ</div>';
    else tgts.forEach(([k,v]) => {
      const el = buildMC(v, k, null);
      el.onclick = () => pickTo(k);
      list.appendChild(el);
    });
  }
  document.getElementById('modal-bg').classList.add('open');
}

function buildMC(card, key, count) {
  const el = document.createElement('div'); el.className = 'mc';
  el.innerHTML = `<div class="mc-emoji">${getEmoji(card)}</div><div class="mc-info"><div class="mc-name">${card.name}</div><div class="mc-rarity ${RARITY_CLASS[card.rarity]||''}">${card.rarity}</div></div>${count!==null ? `<div class="mc-count">x${count}</div>` : ''}`;
  return el;
}

function pickFrom(k){ selectedFrom = k; renderSlot(document.getElementById('slot-from'),k,'from'); if(selectedTo && !getChance()){selectedTo=null; renderSlot(document.getElementById('slot-to'),null,'to');} closeModal(); updateUI(); }
function pickTo(k){ selectedTo = k; renderSlot(document.getElementById('slot-to'),k,'to'); closeModal(); updateUI(); }
function closeModal(){ document.getElementById('modal-bg').classList.remove('open'); }
function closeBg(e){ if(e.target === document.getElementById('modal-bg')) closeModal(); }

async function loadCards(){
  try{ const r = await fetch('cards.json'); allCards = await r.json(); }
  catch(e){ console.warn("cards.json не найден"); }
}

function loadInventory(){
  if (!userId) return;
  tg.sendData(JSON.stringify({ action: "get_inventory", initData: tg.initData }));
}

function saveInventory(){
  if (!userId) return;
  tg.sendData(JSON.stringify({ action: "update_inventory", initData: tg.initData, inventory: inventory }));
}

function doUpgrade() {
  if (spinning || !selectedFrom || !selectedTo) return;
  const chance = getChance(); if (!chance) return;
  spinning = true;
  document.getElementById('btn-upgrade').disabled = true;
  const win = Math.random()*100 < chance;

  spinArrow(win, chance, () => {
    const fl = document.getElementById('result-flash');
    document.getElementById('rf-bg').className = 'rf-bg '+(win?'win':'lose');
    const rt = document.getElementById('rf-text');
    rt.className = 'rf-text '+(win?'win':'lose');
    rt.textContent = win ? 'АПГРЕЙД!' : 'ПРОВАЛ';
    document.getElementById('rf-sub').textContent = win ? 'Получена: '+(allCards[selectedTo]?.name||'') : 'Карточка потеряна навсегда';

    if (win) {
      const i = inventory.indexOf(selectedFrom);
      if(i!==-1) inventory.splice(i,1);
      inventory.push(selectedTo);
    } else {
      const i = inventory.indexOf(selectedFrom);
      if(i!==-1) inventory.splice(i,1);
    }

    saveInventory();
    fl.classList.add('show');

    setTimeout(() => {
      fl.classList.remove('show');
      selectedFrom = selectedTo = null;
      renderSlot(document.getElementById('slot-from'),null,'from');
      renderSlot(document.getElementById('slot-to'),null,'to');
      spinning = false;
      arrowAngle = Math.PI / 2;
      updateUI();
    }, 2800);
  });
}

// ==================== ЗАПУСК ====================
(async () => {
  await loadCards();

  console.log("WebApp запущен. User ID:", userId);

  if (userId) {
    console.log("📤 Запрашиваем инвентарь у бота...");
    loadInventory();
  } else {
    console.log("⚠️ Тестовый режим без Telegram");
    inventory = ['card_001', 'card_006', 'card_009', 'card_018', 'card_021'];
  }

  // Слушаем ответ от бота
  tg.onEvent('webAppDataReceived', (data) => {
    try {
      const payload = JSON.parse(data);
      if (payload && payload.inventory && Array.isArray(payload.inventory)) {
        inventory = payload.inventory;
        console.log(`✅ Инвентарь успешно загружен! Всего карт: ${inventory.length}`);
        console.log("Содержимое:", inventory);
        
        // Обновляем интерфейс после загрузки
        updateUI();
      } else {
        console.warn("Ответ от бота пришёл, но inventory не найден");
      }
    } catch (e) {
      console.error("❌ Ошибка при обработке ответа от бота:", e);
    }
  });

  drawAll(null, arrowAngle);
})();
</script>
</body>
</html>
